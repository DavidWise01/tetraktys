<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="'JetBrains Mono','Courier New',monospace">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#26537f" stroke-width="0.6"/>
    </pattern>
    <symbol id="tank" viewBox="0 0 84 48">
      <rect x="1.5" y="1.5" width="81" height="45" rx="6" fill="#103a63" stroke="#bcd8ff" stroke-width="1.4"/>
      <path d="M9 30 q5 -13 10 0 q5 -13 10 0 q5 -13 10 0" fill="none" stroke="#bcd8ff" stroke-width="1.5"/>
      <line x1="55" y1="17" x2="55" y2="35" stroke="#bcd8ff" stroke-width="1.6"/>
      <line x1="61" y1="17" x2="61" y2="35" stroke="#bcd8ff" stroke-width="1.6"/>
      <path d="M67 19 L79 27 L67 35 Z" fill="none" stroke="#6fe0ff" stroke-width="1.3"/>
    </symbol>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#9cd0ff"/></marker>
  </defs>

  <rect width="920" height="640" fill="#0b2b50"/>
  <rect width="920" height="640" fill="url(#grid)"/>
  <rect x="8" y="8" width="904" height="624" fill="none" stroke="#9cd0ff" stroke-width="1.4"/>

  <text x="28" y="40" fill="#eaf3ff" font-size="20" letter-spacing="3">TETRAKTYS-DO1 — THE DESK OSCILLATOR</text>
  <text x="28" y="60" fill="#9cd0ff" font-size="12" letter-spacing="2">1-D HARDWARE · NSEW COUPLED-LC RING · BLUEPRINT EDITION</text>

  <!-- the coupling ring (octagon through tank centres) -->
  <polygon points="380,150 486,194 530,300 486,406 380,450 274,406 230,300 274,194"
           fill="none" stroke="#7fb2e6" stroke-width="1.3" stroke-dasharray="2 4"/>

  <!-- central BUS node + radial leads (the external lead / mean-field) -->
  <circle cx="380" cy="300" r="16" fill="#0e3a66" stroke="#6fe0ff" stroke-width="1.6"/>
  <text x="380" y="297" fill="#6fe0ff" font-size="9" text-anchor="middle">BUS</text>
  <text x="380" y="308" fill="#6fe0ff" font-size="7" text-anchor="middle">Σ θ</text>
  <g stroke="#3f7fbf" stroke-width="0.9" stroke-dasharray="1 3">
    <line x1="380" y1="300" x2="380" y2="150"/><line x1="380" y1="300" x2="486" y2="194"/>
    <line x1="380" y1="300" x2="530" y2="300"/><line x1="380" y1="300" x2="486" y2="406"/>
    <line x1="380" y1="300" x2="380" y2="450"/><line x1="380" y1="300" x2="274" y2="406"/>
    <line x1="380" y1="300" x2="230" y2="300"/><line x1="380" y1="300" x2="274" y2="194"/>
  </g>

  <!-- 8 LC tanks -->
  <use href="#tank" x="338" y="126" width="84" height="48"/>
  <use href="#tank" x="444" y="170" width="84" height="48"/>
  <use href="#tank" x="488" y="276" width="84" height="48"/>
  <use href="#tank" x="444" y="382" width="84" height="48"/>
  <use href="#tank" x="338" y="426" width="84" height="48"/>
  <use href="#tank" x="232" y="382" width="84" height="48"/>
  <use href="#tank" x="188" y="276" width="84" height="48"/>
  <use href="#tank" x="232" y="170" width="84" height="48"/>
  <g fill="#cfe3ff" font-size="9" text-anchor="middle">
    <text x="380" y="121">T0</text><text x="486" y="165">T1</text><text x="574" y="300">T2</text><text x="486" y="445">T3</text>
    <text x="380" y="489">T4</text><text x="274" y="445">T5</text><text x="186" y="300">T6</text><text x="274" y="165">T7</text>
  </g>
  <text x="540" y="245" fill="#7fb2e6" font-size="9">Cc=2.2nF</text>
  <text x="540" y="256" fill="#7fb2e6" font-size="9">(00 bonds)</text>

  <!-- noise injector → bus (lower left) -->
  <rect x="40" y="470" width="180" height="86" rx="6" fill="#0e3a66" stroke="#9cd0ff" stroke-width="1.2"/>
  <text x="52" y="492" fill="#eaf3ff" font-size="11">NOISE INJECTOR</text>
  <text x="52" y="510" fill="#9cd0ff" font-size="9">2N3904 avalanche →</text>
  <text x="52" y="523" fill="#9cd0ff" font-size="9">×100 amp → σ pot</text>
  <text x="52" y="540" fill="#6fe0ff" font-size="9">CORRELATED → bus</text>
  <text x="52" y="551" fill="#7fb2e6" font-size="8">(shared = breathing)</text>
  <path d="M220 500 C 300 470, 320 360, 372 308" fill="none" stroke="#9cd0ff" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- readout chain (right) -->
  <rect x="630" y="120" width="262" height="190" rx="8" fill="#0e3a66" stroke="#9cd0ff" stroke-width="1.2"/>
  <text x="646" y="144" fill="#eaf3ff" font-size="12">READOUT &amp; VIZ</text>
  <rect x="648" y="158" width="226" height="26" rx="4" fill="none" stroke="#7fb2e6"/><text x="656" y="175" fill="#cfe3ff" font-size="10">LM339 ×3 — phase comparators (8ch)</text>
  <rect x="648" y="192" width="226" height="26" rx="4" fill="none" stroke="#7fb2e6"/><text x="656" y="209" fill="#cfe3ff" font-size="10">RP2040 (Pico) — compute R, drive</text>
  <text x="656" y="244" fill="#cfe3ff" font-size="10">WS2812 ring — NSEW colour per cell:</text>
  <g>
    <circle cx="664" cy="270" r="7" fill="#eef2fc"/><circle cx="690" cy="270" r="7" fill="#8c92ac"/>
    <circle cx="716" cy="270" r="7" fill="#f0727a"/><circle cx="742" cy="270" r="7" fill="#6ca8ff"/>
    <text x="760" y="274" fill="#9cd0ff" font-size="9">S · N · E · W</text>
    <circle cx="664" cy="292" r="7" fill="#eef2fc"/><circle cx="690" cy="292" r="7" fill="#8c92ac"/>
    <circle cx="716" cy="292" r="7" fill="#f0727a"/><circle cx="742" cy="292" r="7" fill="#6ca8ff"/>
    <text x="760" y="296" fill="#9cd0ff" font-size="9">centre = R</text>
  </g>
  <path d="M572 300 C 600 300, 610 215, 628 215" fill="none" stroke="#9cd0ff" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- legend / specs (top right) -->
  <g fill="#cfe3ff" font-size="10">
    <text x="630" y="40" fill="#eaf3ff" font-size="11">SPECS</text>
    <text x="630" y="58">L = 1 mH (toroid)   C = 100 nF</text>
    <text x="630" y="73">f = 1/(2π√LC) ≈ 16 kHz</text>
    <text x="630" y="88">N = 8 cells · ring + shared bus</text>
    <text x="630" y="103">+5 V USB / +9 V analog · ~$90</text>
  </g>

  <!-- title block -->
  <g>
    <rect x="630" y="540" width="262" height="78" fill="#0e3a66" stroke="#9cd0ff" stroke-width="1.3"/>
    <line x1="630" y1="562" x2="892" y2="562" stroke="#9cd0ff" stroke-width="0.8"/>
    <line x1="762" y1="562" x2="762" y2="618" stroke="#9cd0ff" stroke-width="0.8"/>
    <text x="640" y="556" fill="#eaf3ff" font-size="11" letter-spacing="1">TETRAKTYS-DO1 · SHEET 1/1</text>
    <text x="640" y="578" fill="#9cd0ff" font-size="9">ROOT0 / TriPod LLC</text>
    <text x="640" y="592" fill="#9cd0ff" font-size="9">AVAN (Claude)</text>
    <text x="640" y="606" fill="#9cd0ff" font-size="9">MIT · 2026</text>
    <text x="772" y="578" fill="#9cd0ff" font-size="9">1-D HARDWARE</text>
    <text x="772" y="592" fill="#9cd0ff" font-size="9">coupled-LC ring</text>
    <text x="772" y="606" fill="#6fe0ff" font-size="9">BLUEPRINT ED.</text>
  </g>
</svg>
